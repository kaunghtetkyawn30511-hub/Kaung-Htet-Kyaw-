<!doctype html>
<html lang="en" class="no-js">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Logo design portfolio by Kaung Htet Kyaw.">
  <title>Logo Design - Kaung Htet Kyaw</title>
  <script>
    (function () {
      document.documentElement.classList.replace('no-js', 'js');
      try {
        var storedTheme = localStorage.getItem('khk-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = storedTheme || (prefersDark ? 'dark' : 'light');
      } catch (error) {
        document.documentElement.dataset.theme = 'light';
      }
    }());
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="custom-cursor" class="custom-cursor" aria-hidden="true"><span></span></div>

  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="./index.html#top" data-cursor="Home"><span>KHK</span><small>Graphic Designer</small></a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="./index.html#about" data-cursor="About">About</a>
        <a href="./projects.html" data-cursor="Work">Projects</a>
        <a href="./index.html#skills" data-cursor="Skills">Skills</a>
        <a href="./index.html#contact" data-cursor="Contact">Contact</a>
        <a class="nav-cv" href="./KaungHtetKyaw_CV.pdf" download data-cursor="CV">Download CV</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false" aria-label="Switch color theme" data-cursor="Theme">
          <span class="theme-toggle-icon" aria-hidden="true"></span>
          <span data-theme-label>Dark</span>
        </button>
      </nav>
    </div>
  </header>

  <main id="main" class="page-main">
    <section class="page-hero section-pad">
      <p class="mono reveal">Project 02 / Logo Design</p>
      <h1 class="reveal">Modern brand logo concept.</h1>
      <p class="page-lead reveal">Logo marks, brand presentation boards, and identity visuals for product, service, and retail concepts.</p>
    </section>

    <section class="section-pad section-border">
      <div class="gallery-grid gallery-grid-wide" aria-label="Logo design gallery">
        <button type="button" class="gallery-item" data-lightbox="./smm1.jpg" data-caption="Logo Design - Good Choice" data-cursor="View"><img src="./smm1.jpg" alt="Good Choice brand identity concept" loading="lazy"></button>
        <button type="button" class="gallery-item" data-lightbox="./smm2.jpg" data-caption="Logo Design - Hsu San" data-cursor="View"><img src="./smm2.jpg" alt="Hsu San luxury fashion logo design" loading="lazy"></button>
        <button type="button" class="gallery-item" data-lightbox="./smm3.jpg" data-caption="Logo Design - Thae Thae" data-cursor="View"><img src="./smm3.jpg" alt="Thae Thae product logo concept" loading="lazy"></button>
        <button type="button" class="gallery-item" data-lightbox="./smm4.jpg" data-caption="Logo Design - Lily" data-cursor="View"><img src="./smm4.jpg" alt="Lily brand presentation design" loading="lazy"></button>
        <button type="button" class="gallery-item" data-lightbox="./smm5.jpg" data-caption="Logo Design - Yangon phone store" data-cursor="View"><img src="./smm5.jpg" alt="Yangon phone store logo design" loading="lazy"></button>
      </div>
    </section>
  </main>

  <dialog class="lightbox" data-modal aria-label="Image preview">
    <button type="button" class="lightbox-close" data-close aria-label="Close preview">Close</button>
    <img data-modal-image alt="">
    <p data-modal-caption></p>
  </dialog>

  <footer class="site-footer">
    <p>Designed by Kaung Htet Kyaw</p>
    <p>Portfolio &mdash; Graphic Designer</p>
    <p>KHK</p>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
